async function sb(table,method="GET",body=null,query=""){
  const url=`${SUPA_URL}/rest/v1/${table}${query}`;
  const headers={"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`,"Prefer":method==="POST"?"return=representation":"return=representation"};

  const r=await fetch(url,{method,headers,body:body?JSON.stringify(body):null});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=r.status===204?"[]":await r.text();
  try{return JSON.parse(t);}catch{return [];}
}

// ── COUNT UP HOOK ──
function useCountUp(target,dur=900){
  const [val,setVal]=useState(0);
  const ref=useRef(0);
  useEffect(()=>{
    const start=ref.current,t0=performance.now();
    let raf;
    function tick(t){
      const p=Math.min((t-t0)/dur,1),e=1-Math.pow(1-p,3),v=start+(target-start)*e;
      setVal(v);ref.current=v;
      if(p<1)raf=requestAnimationFrame(tick);else{setVal(target);ref.current=target;}
    }
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[target]);
  return val;
}

// ── STOCK PRICE FETCHER (CORS-friendly proxies) ──
async function fetchIDXPrice(ticker){
  const sources=[
    async()=>{
      const r=await fetch(`https://query2.finance.yahoo.com/v8/finance/chart/${ticker}.JK?interval=1d&range=1d`,{headers:{"Accept":"application/json"}});
      const j=await r.json();
      return j?.chart?.result?.[0]?.meta?.regularMarketPrice||null;
    },
    async()=>{
      const r=await fetch(`https://api.stlouisfed.org/geofred/regional/data?series_group=882&date=2015-01-01&region_type=state&units=Dollars&frequency=a&season=NSA&api_key=abcdef`);
      return null;
    },
  ];
  for(const src of sources){
    try{const p=await src();if(p&&p>0)return p;}catch(e){}
  }
  return null;
}

async function fetchAllStockPrices(stocks){
  const prices={};
  await Promise.all([...new Set(stocks.map(s=>s.ticker))].map(async ticker=>{
    const p=await fetchIDXPrice(ticker);
    if(p)prices[ticker]=p;
  }));
  return prices;
}

// ── ROOT ──
function Root(){
  const [profiles,setProfiles]=useState([]);
  const [activeId,setActiveId]=useState(()=>localStorage.getItem("wealth_active")||null);
  const [phase,setPhase]=useState("loading");
  const [error,setError]=useState(null);

  useEffect(()=>{init();},[]);

  async function init(){
    try{
      const rows=await dbGet("profiles","?order=created_at.asc");
      setProfiles(rows);
      const aid=localStorage.getItem("wealth_active");
      if(aid&&rows.find(p=>p.id===aid)){setActiveId(aid);setPhase("app");}
      else setPhase("picker");
    }catch(e){setError("Cannot connect to database. Check your internet connection.");setPhase("error");}
  }

  async function addProfile(name,color){
    const p={id:uid(),name,color,cash_balance:0};
    await dbPost("profiles",p);
    // seed default gym days
    for(let i=0;i<DEFAULT_GYM_DAYS.length;i++){
      const day=DEFAULT_GYM_DAYS[i];
      const dayId=uid();
      await dbPost("workout_days",{id:dayId,profile_id:p.id,label:day.label,icon:day.icon,sort_order:i});
      for(let j=0;j<day.exercises.length;j++){
        await dbPost("workout_exercises",{id:uid(),day_id:dayId,name:day.exercises[j],sort_order:j});
      }
    }
    setProfiles(prev=>[...prev,p]);
    selectProfile(p.id);
  }

  async function deleteProfile(id){
    await dbDelete("profiles",`?id=eq.${id}`);
    setProfiles(prev=>prev.filter(p=>p.id!==id));
    if(activeId===id){localStorage.removeItem("wealth_active");setActiveId(null);setPhase("picker");}
  }

  async function editName(id,name){
    await dbPatch("profiles",`?id=eq.${id}`,{name});
    setProfiles(prev=>prev.map(p=>p.id===id?{...p,name}:p));
  }

  function selectProfile(id){setActiveId(id);localStorage.setItem("wealth_active",id);setPhase("app");}

  const active=profiles.find(p=>p.id===activeId)||null;

  if(phase==="loading")return<Spinner/>;
  if(phase==="error")return<Err msg={error} onRetry={init}/>;
  if(phase==="picker"||!active)return<Picker profiles={profiles} onSelect={selectProfile} onAdd={addProfile} onDelete={deleteProfile} onEditName={editName}/>;
  return<App key={activeId} profile={active} onSwitch={()=>{localStorage.removeItem("wealth_active");setPhase("picker");}} onUpdateProfile={p=>setProfiles(prev=>prev.map(x=>x.id===p.id?p:x))}/>;
}

      {appTab==="finance"&&<FinanceApp profile={profile} onUpdateProfile={onUpdateProfile}/>}
      {appTab==="gym"&&<GymApp profile={profile}/>}
    </div>
  );
}

// FINANCE APP
// ══════════════════════════════════════════════
const FIN_NAV=[{id:"home",icon:"ti-home-2",label:"Home"},{id:"budget",icon:"ti-chart-donut-3",label:"Budget"},{id:"portfolio",icon:"ti-trending-up",label:"Wealth"},{id:"history",icon:"ti-history",label:"History"},{id:"setup",icon:"ti-settings-2",label:"Setup"}];

function FinanceApp({profile,onUpdateProfile}){
  const [tab,setTab]=useState("home");
  const [month,setMonth]=useState(nowMonth());
  const [showAdd,setShowAdd]=useState(false);
  const [editTxn,setEditTxn]=useState(null);
  const [usdIdr,setUsdIdr]=useState(17850);
  const [stockPrices,setStockPrices]=useState({});
  const [cryptoPrices,setCryptoPrices]=useState({});
  const [refreshing,setRefreshing]=useState(false);
  const [data,setData]=useState({transactions:[],accounts:[],budgets:{},stocks:[],crypto:[],deposits:[],loans:[]});
  const [loading,setLoading]=useState(true);

  useEffect(()=>{loadAll();},[profile.id]);
  useEffect(()=>{if(!loading)fetchPrices();},[loading,data.stocks,data.crypto]);

  async function loadAll(){
    setLoading(true);
    try{
      const [txns,accs,bgets,stks,crys,deps,lns]=await Promise.all([
        dbGet("transactions",`?profile_id=eq.${profile.id}&order=date.desc`),
        dbGet("accounts",`?profile_id=eq.${profile.id}`),
        dbGet("budgets",`?profile_id=eq.${profile.id}`),
        dbGet("stocks",`?profile_id=eq.${profile.id}`),
        dbGet("crypto",`?profile_id=eq.${profile.id}`),
        dbGet("deposits",`?profile_id=eq.${profile.id}`),
        dbGet("loans",`?profile_id=eq.${profile.id}`),
      ]);
      const budgetsObj={};
      (bgets||[]).forEach(b=>{budgetsObj[b.category]=b.amount;});
      setData({
        transactions:txns||[],accounts:accs||[],budgets:budgetsObj,
        stocks:stks||[],crypto:crys||[],deposits:deps||[],loans:lns||[],
        budgetRows:bgets||[],
      });
    }catch(e){console.error(e);}
    setLoading(false);
  }

  async function fetchPrices(){
    setRefreshing(true);
    try{const r=await fetch("https://api.frankfurter.app/latest?from=USD&to=IDR");const j=await r.json();if(j?.rates?.IDR)setUsdIdr(j.rates.IDR);}catch(e){}
    if(data.stocks?.length){
      const prices=await fetchAllStockPrices(data.stocks);
      setStockPrices(prices);
    }
    if(data.crypto?.length){
      try{
        const coins=[...new Set(data.crypto.map(c=>c.coin.toLowerCase()))];
        const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coins.join(",")}&vs_currencies=idr`);
        const j=await r.json();const p={};Object.entries(j).forEach(([k,v])=>{p[k]=v.idr;});
        setCryptoPrices(p);
      }catch(e){}
    }
    setRefreshing(false);
  }

  function accountBalance(id){
    const a=data.accounts.find(x=>x.id===id);if(!a)return 0;
    return a.opening_balance+data.transactions.filter(t=>t.account_id===id).reduce((s,t)=>t.type==="income"?s+t.amount:s-t.amount,0);
  }
  function cashRunning(){return(profile.cash_balance||0)+data.transactions.filter(t=>!t.account_id||t.account_id==="cash").reduce((s,t)=>t.type==="income"?s+t.amount:s-t.amount,0);}
  const totalBank=data.accounts.reduce((s,a)=>s+accountBalance(a.id),0);
  const totalCash=cashRunning();
  const totalLiquid=totalBank+totalCash;
  const monthTxns=data.transactions.filter(t=>mk(t.date)===month);
  const income=monthTxns.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense=monthTxns.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const allMonths=[...new Set(data.transactions.map(t=>mk(t.date)))].sort().reverse();
  if(!allMonths.includes(nowMonth()))allMonths.unshift(nowMonth());

  async function saveTxn(t){
    const row={id:t.id,profile_id:profile.id,type:t.type,amount:t.amount,category:t.category,cat_id:t.catId,account_id:t.accountId,note:t.note,date:t.date};
    if(data.transactions.find(x=>x.id===t.id)){
      await dbPatch("transactions",`?id=eq.${t.id}`,row);
      setData(d=>({...d,transactions:d.transactions.map(x=>x.id===t.id?{...x,...row}:x)}));
    }else{
      await dbPost("transactions",row);
      setData(d=>({...d,transactions:[{...row},...d.transactions]}));
    }
    setEditTxn(null);setShowAdd(false);
  }

  async function deleteTxn(id){
    await dbDelete("transactions",`?id=eq.${id}`);
    setData(d=>({...d,transactions:d.transactions.filter(x=>x.id!==id)}));
  }

  if(loading)return<div style={{paddingBottom:90}}><Spinner/></div>;

  return(
    <div style={{paddingBottom:90}}>
      {tab==="home"&&<FHome monthTxns={monthTxns} income={income} expense={expense} month={month} setMonth={setMonth} allMonths={allMonths} data={data} profile={profile} accountBalance={accountBalance} totalLiquid={totalLiquid} totalCash={totalCash} onEdit={t=>{setEditTxn(t);setShowAdd(true);}} onDelete={deleteTxn}/>}
      {tab==="budget"&&<FBudget data={data} setData={setData} profile={profile} monthTxns={monthTxns} month={month}/>}
      {tab==="portfolio"&&<FPortfolio data={data} stockPrices={stockPrices} cryptoPrices={cryptoPrices} usdIdr={usdIdr} refreshing={refreshing} onRefresh={fetchPrices}/>}
      {tab==="history"&&<FHistory data={data} month={month} setMonth={setMonth} allMonths={allMonths} onEdit={t=>{setEditTxn(t);setShowAdd(true);}} onDelete={deleteTxn}/>}
      {tab==="setup"&&<FSetup data={data} setData={setData} profile={profile} onUpdateProfile={onUpdateProfile} accountBalance={accountBalance}/>}

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,zIndex:40,paddingBottom:"env(safe-area-inset-bottom)"}}>
        <div style={{margin:"0 12px 8px",background:"var(--surface)",borderRadius:24,display:"flex",alignItems:"center",boxShadow:"0 8px 30px rgba(0,0,0,0.12)",border:"1px solid var(--border)",padding:"4px"}}>
          {FIN_NAV.slice(0,2).map(n=><FNav key={n.id} n={n} active={tab===n.id} onClick={()=>setTab(n.id)}/>)}
          <div style={{flex:"0 0 auto",display:"flex",justifyContent:"center"}}>
            <button onClick={()=>{setEditTxn(null);setShowAdd(true);}} className="nav-press" style={{width:50,height:50,margin:"0 4px",borderRadius:"50%",background:"var(--grad)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 18px rgba(16,185,129,0.5)"}}><i className="ti ti-plus" style={{fontSize:26,color:"#fff"}}/></button>
          </div>
          {FIN_NAV.slice(2).map(n=><FNav key={n.id} n={n} active={tab===n.id} onClick={()=>setTab(n.id)}/>)}
        </div>
      </div>
      {showAdd&&<QuickAdd initial={editTxn} accounts={data.accounts} onSave={saveTxn} onClose={()=>{setShowAdd(false);setEditTxn(null);}}/>}
    </div>
  );
}

function FNav({n,active,onClick}){return<button onClick={onClick} className="nav-press" style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"9px 0",background:"none",border:"none",cursor:"pointer",color:active?"var(--emerald)":"var(--text3)"}}><i className={`ti ${n.icon}`} style={{fontSize:21}/><span style={{fontSize:9,fontWeight:active?700:500}}>{n.label}</span></button>;}

// ── QUICK ADD ──
function QuickAdd({initial,accounts,onSave,onClose}){
  const isEdit=!!initial?.id;
  const [type,setType]=useState(initial?.type||"expense");
  const [amount,setAmount]=useState(initial?.amount?String(initial.amount):"");
  const [cat,setCat]=useState(()=>{if(!initial)return ECATS[0];return[...ECATS,...ICATS].find(c=>c.label===initial.category)||ECATS[0];});
  const [accountId,setAccountId]=useState(initial?.account_id||"cash");
  const [note,setNote]=useState(initial?.note||"");
  const [date,setDate]=useState(initial?.date||todayStr());
  const [saving,setSaving]=useState(false);
  const cats=type==="expense"?ECATS:ICATS;
  useEffect(()=>{if(!isEdit)setCat(cats[0]);},[type]);
  function np(v){if(v==="⌫"){setAmount(a=>a.slice(0,-1));return;}if(v==="."&&amount.includes("."))return;if(amount==="0"&&v!==".")setAmount(v);else setAmount(a=>(a+v).slice(0,12));}
  async function save(){
    if(!amount||+amount===0||saving)return;
    setSaving(true);
    await onSave({id:initial?.id||uid(),type,amount:+amount,category:cat.label,catId:cat.id,accountId,note,date});
    setSaving(false);
  }
  const accent=type==="expense"?"#EF4444":"#10B981";
  const accOpts=[{id:"cash",label:"Cash",icon:"ti-wallet",color:"#D4A017"},...accounts.map(a=>({...a,icon:"ti-building-bank",color:"#0E8C5E"}))];
  return(
    <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",flexDirection:"column",justifyContent:"flex-end",background:"rgba(0,0,0,0.55)",animation:"fadeIn .2s ease"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",borderRadius:"26px 26px 0 0",paddingBottom:"env(safe-area-inset-bottom)",maxHeight:"94vh",overflowY:"auto",animation:"slideUp .32s cubic-bezier(.34,1.3,.64,1)"}}>
        <div style={{width:38,height:4,borderRadius:99,background:"var(--border)",margin:"10px auto 4px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 18px 0"}}><span style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>{isEdit?"Edit":"New transaction"}</span><button onClick={onClose} style={{background:"var(--surface2)",border:"none",borderRadius:10,width:32,height:32,cursor:"pointer",color:"var(--text2)"}}><i className="ti ti-x" style={{fontSize:18}}/></button></div>
        <div style={{display:"flex",margin:"12px 18px 0",background:"var(--surface2)",borderRadius:14,padding:4,gap:4}}>{["expense","income"].map(t=><button key={t} onClick={()=>setType(t)} style={{flex:1,padding:"10px",borderRadius:11,border:"none",background:type===t?accent:"transparent",color:type===t?"#fff":"var(--text2)",cursor:"pointer",fontSize:14,fontWeight:600,textTransform:"capitalize",transition:"all .2s"}}>{t}</button>)}</div>
        <div style={{padding:"12px 18px 0",display:"flex",alignItems:"center",gap:6}}><i className="ti ti-calendar" style={{fontSize:15,color:"var(--text3)"}}/><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{fontSize:13,border:"none",background:"none",color:"var(--text2)",outline:"none"}}/></div>
        <div style={{textAlign:"center",padding:"6px 18px 6px"}}><div style={{fontSize:11,color:"var(--text3)"}}>Amount (Rp)</div><div style={{fontSize:40,fontWeight:800,color:amount?accent:"var(--text3)",letterSpacing:-1.5,minHeight:48}}>{amount?Number(amount).toLocaleString("id-ID"):"0"}</div></div>
        <div style={{padding:"0 18px 8px"}}><div style={{fontSize:11,color:"var(--text3)",marginBottom:6,fontWeight:600}}>ACCOUNT</div><div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>{accOpts.map(a=><button key={a.id} onClick={()=>setAccountId(a.id)} style={{flexShrink:0,display:"flex",alignItems:"center",gap:6,padding:"8px 13px",borderRadius:12,border:`2px solid ${accountId===a.id?a.color:"var(--border)"}`,background:accountId===a.id?a.color+"18":"var(--surface2)",cursor:"pointer"}}><i className={`ti ${a.icon}`} style={{fontSize:14,color:accountId===a.id?a.color:"var(--text3)"}}/><span style={{fontSize:12,fontWeight:500,color:accountId===a.id?a.color:"var(--text2)",whiteSpace:"nowrap"}}>{a.label}</span></button>)}</div></div>
        <div style={{padding:"0 18px 8px"}}><div style={{fontSize:11,color:"var(--text3)",marginBottom:6,fontWeight:600}}>CATEGORY</div><div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>{cats.map(c=><button key={c.id} onClick={()=>setCat(c)} style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"8px 11px",borderRadius:14,border:`2px solid ${cat.id===c.id?c.color:"var(--border)"}`,background:cat.id===c.id?c.color+"18":"var(--surface2)",cursor:"pointer",minWidth:60}}><i className={`ti ${c.icon}`} style={{fontSize:19,color:cat.id===c.id?c.color:"var(--text3)"}}/><span style={{fontSize:9,fontWeight:500,color:cat.id===c.id?c.color:"var(--text3)",whiteSpace:"nowrap"}}>{c.label}</span></button>)}</div></div>
        <div style={{padding:"0 18px 8px"}}><input type="text" placeholder="Add a note (optional)" value={note} onChange={e=>setNote(e.target.value)} style={{width:"100%",fontSize:14,padding:"11px 14px",borderRadius:13,border:"1px solid var(--border)",background:"var(--surface2)",color:"var(--text)",outline:"none",boxSizing:"border-box"}}/></div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,padding:"0 14px 8px"}}>{["1","2","3","4","5","6","7","8","9",".","0","⌫"].map(v=><button key={v} onClick={()=>np(v)} className="card-press" style={{padding:"15px",fontSize:21,fontWeight:600,background:"var(--surface2)",border:"none",borderRadius:13,cursor:"pointer",color:"var(--text)"}}>{v==="⌫"?<i className="ti ti-backspace" style={{fontSize:20}}/>:v}</button>)}</div>
        <div style={{padding:"4px 18px 14px"}}><button onClick={save} disabled={!amount||+amount===0||saving} className="card-press" style={{width:"100%",padding:"16px",borderRadius:16,border:"none",background:(!amount||+amount===0)?"var(--border)":`linear-gradient(135deg,${accent},${accent}cc)`,color:"#fff",fontSize:16,fontWeight:700,cursor:(!amount||+amount===0)?"default":"pointer",boxShadow:(!amount||+amount===0)?"none":`0 6px 18px ${accent}55`}}>{saving?"Saving…":isEdit?"Update":"Save "+type}</button></div>
      </div>
    </div>
  );
}

// ── FINANCE HOME ──
function FHome({monthTxns,income,expense,month,setMonth,allMonths,data,profile,accountBalance,totalLiquid,totalCash,onEdit,onDelete}){
  const animLiquid=useCountUp(totalLiquid);
  const net=income-expense;
  const savRate=income>0?Math.round(net/income*100):0;
  const expByCat={};monthTxns.filter(t=>t.type==="expense").forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount;});
  const catList=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).slice(0,4);
  return(
    <div>
      <div style={{background:"var(--grad)",backgroundSize:"200% 200%",animation:"shimmer 10s ease infinite",padding:"18px 18px 30px",borderRadius:"0 0 28px 28px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-30,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,0.08)"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,position:"relative"}}>
          <div><div style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>Total liquid assets</div><div style={{fontSize:38,fontWeight:800,color:"#fff",letterSpacing:-1.5,lineHeight:1.1}}>Rp {fmtK(animLiquid)}</div></div>
          <select value={month} onChange={e=>setMonth(e.target.value)} style={{fontSize:11,background:"rgba(255,255,255,0.18)",color:"#fff",border:"none",borderRadius:10,padding:"6px 10px",fontWeight:600}}>{allMonths.map(m=><option key={m} value={m} style={{color:"#000"}}>{monthLabel(m)}</option>)}</select>
        </div>
        <div style={{display:"flex",gap:10,position:"relative"}}>
          <div style={{flex:1,background:"rgba(255,255,255,0.15)",backdropFilter:"blur(8px)",borderRadius:14,padding:"10px 12px"}}><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><i className="ti ti-arrow-down-left" style={{fontSize:13,color:"#86EFAC"}}/><span style={{fontSize:10,color:"rgba(255,255,255,0.7)"}}>Income</span></div><div style={{fontSize:16,fontWeight:700,color:"#fff"}}>Rp {fmtK(income)}</div></div>
          <div style={{flex:1,background:"rgba(255,255,255,0.15)",backdropFilter:"blur(8px)",borderRadius:14,padding:"10px 12px"}}><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><i className="ti ti-arrow-up-right" style={{fontSize:13,color:"#FCA5A5"}}/><span style={{fontSize:10,color:"rgba(255,255,255,0.7)"}}>Expenses</span></div><div style={{fontSize:16,fontWeight:700,color:"#fff"}}>Rp {fmtK(expense)}</div></div>
        </div>
      </div>
      <div style={{padding:"16px 16px 0"}}>
        <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:4}}>
          <ChipCard label="Cash" value={totalCash} icon="ti-wallet" color="#D4A017" delay={0}/>
          {data.accounts.map((a,i)=><ChipCard key={a.id} label={a.label} value={accountBalance(a.id)} icon="ti-building-bank" color="#0E8C5E" delay={(i+1)*0.05}/>)}
        </div>
      </div>
      <div className="spring" style={{margin:"16px 16px 0",background:"var(--surface)",borderRadius:18,padding:"14px 16px",border:"1px solid var(--border)",display:"flex",alignItems:"center",gap:14}}>
        <div style={{position:"relative",width:48,height:48}}>
          <svg width="48" height="48" style={{transform:"rotate(-90deg)"}}><circle cx="24" cy="24" r="20" fill="none" stroke="var(--surface2)" strokeWidth="5"/><circle cx="24" cy="24" r="20" fill="none" stroke={savRate>=20?"#10B981":savRate>=0?"#F59E0B":"#EF4444"} strokeWidth="5" strokeLinecap="round" strokeDasharray={`${Math.max(0,Math.min(savRate,100))/100*125.6} 125.6`}/></svg>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"var(--text)"}}>{savRate}%</div>
        </div>
        <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>Savings rate</div><div style={{fontSize:12,color:"var(--text2)"}}>{savRate>=20?"Excellent! Keep it up 🎯":savRate>=0?"Saving — push higher":"Over income this month"}</div></div>
      </div>
      {catList.length>0&&<div style={{margin:"16px 16px 0"}}><div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:12}}>Top spending</div>{catList.map(([cat,amt])=>{const c=ECATS.find(e=>e.label===cat)||{color:"#888",icon:"ti-dots"};const pct=expense>0?Math.round(amt/expense*100):0;return<div key={cat} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}><div style={{width:42,height:42,borderRadius:13,background:`${c.color}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><i className={`ti ${c.icon}`} style={{fontSize:18,color:c.color}}/></div><div style={{flex:1,minWidth:0}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:13,fontWeight:500,color:"var(--text)"}}>{cat}</span><span style={{fontSize:13,fontWeight:700}}>Rp {fmtK(amt)}</span></div><div style={{height:6,borderRadius:99,background:"var(--surface2)",overflow:"hidden"}}><div style={{height:6,borderRadius:99,width:pct+"%",background:`linear-gradient(90deg,${c.color},${c.color}aa)`,transition:"width 1s cubic-bezier(.34,1.56,.64,1))"}}/></div></div></div>;})}</div>}

    </div>
  );
}

function ChipCard({label,value,icon,color,delay}){

  return<div className="spring" style={{flexShrink:0,minWidth:130,background:"var(--surface)",borderRadius:16,padding:"12px 14px",border:"1px solid var(--border)",animationDelay:delay+"s"}}>
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><div style={{width:26,height:26,borderRadius:8,background:color+"1e",display:"flex",alignItems:"center",justifyContent:"center"}}><i className={`ti ${icon}`} style={{fontSize:14,color}}/></div><span style={{fontSize:11,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</span></div>

function FTxnRow({t,accounts,onEdit,onDelete}){
  const [swiped,setSwiped]=useState(false);
  const c=t.type==="expense"?ECATS.find(e=>e.label===t.category):ICATS.find(e=>e.label===t.category);
  const color=c?.color||"#888",icon=c?.icon||"ti-tag";
  const acc=accounts.find(a=>a.id===t.account_id);
  const accLabel=(!t.account_id||t.account_id==="cash")?"Cash":acc?.label||"—";
  return(
    <div style={{position:"relative",marginBottom:8,borderRadius:16,overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"#EF4444",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:18}}><button onClick={onDelete} style={{background:"none",border:"none",color:"#fff",cursor:"pointer"}}><i className="ti ti-trash" style={{fontSize:20}}/></button></div>
      <div style={{position:"relative",display:"flex",alignItems:"center",gap:12,padding:"11px 12px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,transform:swiped?"translateX(-60px)":"translateX(0)",transition:"transform .25s"}}>
        <button onClick={onEdit} style={{width:42,height:42,borderRadius:13,background:`${color}22`,border:"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer"}}><i className={`ti ${icon}`} style={{fontSize:18,color}}/></button>
        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={onEdit}><div style={{fontSize:13,fontWeight:500,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.note||t.category}</div><div style={{fontSize:11,color:"var(--text3)"}}>{accLabel} · {t.date}</div></div>
        <div style={{fontSize:14,fontWeight:700,color:t.type==="income"?"#10B981":"var(--text)",flexShrink:0}}>{t.type==="income"?"+":"−"}{fmtK(t.amount)}</div>

// ── FINANCE BUDGET ──
function FBudget({data,setData,profile,monthTxns,month}){
  const [editing,setEditing]=useState(null);
  const [val,setVal]=useState("");
  const [saving,setSaving]=useState(false);
  const expByCat={};monthTxns.filter(t=>t.type==="expense").forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount;});
  const totalBudget=Object.values(data.budgets||{}).reduce((s,v)=>s+v,0);
  const totalSpent=Object.keys(data.budgets||{}).reduce((s,k)=>s+(expByCat[k]||0),0);
  const underBudget=totalBudget>0&&totalSpent<=totalBudget;

  async function save(cat){
    const v=parseFloat(val.replace(/[^0-9.]/g,""));
    if(isNaN(v)||v<=0){setEditing(null);return;}
    setSaving(true);
    const existing=(data.budgetRows||[]).find(b=>b.category===cat);
    if(existing){await dbPatch("budgets",`?id=eq.${existing.id}`,{amount:v});}
    else{const row={id:uid(),profile_id:profile.id,category:cat,amount:v};await dbPost("budgets",row);setData(d=>({...d,budgetRows:[...(d.budgetRows||[]),row]}));}
    setData(d=>({...d,budgets:{...d.budgets,[cat]:v}}));
    setSaving(false);setEditing(null);setVal("");
  }
  async function removeBudget(cat){
    const existing=(data.budgetRows||[]).find(b=>b.category===cat);
    if(existing)await dbDelete("budgets",`?id=eq.${existing.id}`);
    setData(d=>{const b={...d.budgets};delete b[cat];return{...d,budgets:b};});
  }

  return(
    <div style={{padding:"20px 16px 0"}}>
      <div style={{fontSize:22,fontWeight:800,color:"var(--text)",letterSpacing:-0.5}}>Budget</div>
      <div style={{fontSize:13,color:"var(--text3)",marginBottom:16}}>{monthLabel(month)}</div>
      {totalBudget>0&&(
        <div className="spring" style={{background:"var(--grad)",backgroundSize:"200% 200%",animation:"shimmer 10s ease infinite",borderRadius:20,padding:"18px",marginBottom:16,position:"relative",overflow:"hidden"}}>
          {underBudget&&<Confetti/>}
          <div style={{fontSize:12,color:"rgba(255,255,255,0.8)"}}>Spent of budget</div>
          <div style={{fontSize:30,fontWeight:800,color:"#fff",letterSpacing:-1,marginTop:2}}>Rp {fmtK(totalSpent)}</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.7)",marginTop:2}}>of Rp {fmtK(totalBudget)} limit</div>
          <div style={{height:8,borderRadius:99,background:"rgba(255,255,255,0.25)",marginTop:12,overflow:"hidden"}}><div style={{height:8,borderRadius:99,width:Math.min(totalSpent/totalBudget*100,100)+"%",background:totalSpent>totalBudget?"#FCA5A5":"var(--goldbright)",transition:"width 1s ease"}}/></div>
          <div style={{fontSize:12,color:"#fff",marginTop:8,fontWeight:600}}>{underBudget?"✨ Within budget!":"⚠️ Over budget"}</div>
        </div>
      )}
      {ECATS.map(cat=>{
        const spent=expByCat[cat.label]||0,budget=(data.budgets||{})[cat.label]||0;
        const pct=budget>0?Math.min(spent/budget*100,100):0,over=budget>0&&spent>budget,ed=editing===cat.label;
        return<div key={cat.id} className="card-press" style={{background:"var(--surface)",border:`1px solid ${over?"#EF4444":ed?cat.color:"var(--border)"}`,borderRadius:16,padding:"13px 14px",marginBottom:8,cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:budget>0&&!ed?9:0}} onClick={()=>{if(!ed){setEditing(cat.label);setVal(budget?String(Math.round(budget)):"")};}}>
            <div style={{width:40,height:40,borderRadius:13,background:`${cat.color}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><i className={`ti ${cat.icon}`} style={{fontSize:18,color:cat.color}}/></div>
            <div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{cat.label}</span><div style={{display:"flex",alignItems:"center",gap:6}}>{over&&<span style={{fontSize:10,background:"#FEE2E2",color:"#DC2626",padding:"2px 8px",borderRadius:99,fontWeight:700}}>Over</span>}<span style={{fontSize:13,fontWeight:700,color:over?"#EF4444":"var(--text)"}}>{budget>0?`${fmtK(spent)}/${fmtK(budget)}`:fmtK(spent)}</span></div></div></div>
            {budget>0&&!ed&&<div style={{display:"flex",gap:2}}><button onClick={e=>{e.stopPropagation();setEditing(cat.label);setVal(String(Math.round(budget)));}} style={{background:"none",border:"none",color:cat.color,cursor:"pointer",padding:4}}><i className="ti ti-pencil" style={{fontSize:14}}/></button><button onClick={e=>{e.stopPropagation();removeBudget(cat.label);}} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",padding:4}}><i className="ti ti-trash" style={{fontSize:14}}/></button></div>}
          </div>
          {budget>0&&!ed&&<div style={{height:6,borderRadius:99,background:"var(--surface2)",overflow:"hidden"}}><div style={{height:6,borderRadius:99,width:pct+"%",background:over?"#EF4444":`linear-gradient(90deg,${cat.color},${cat.color}aa)`,transition:"width .8s ease"}}/></div>}
          {ed&&<div style={{display:"flex",gap:8,marginTop:10}} onClick={e=>e.stopPropagation()}><input autoFocus type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="Limit (Rp)" style={{flex:1,fontSize:14,padding:"9px 12px",borderRadius:11,border:`2px solid ${cat.color}`,background:"var(--surface2)",color:"var(--text)",outline:"none"}}/><button onClick={()=>save(cat.label)} disabled={saving} style={{background:cat.color,color:"#fff",border:"none",borderRadius:11,padding:"9px 16px",cursor:"pointer",fontSize:13,fontWeight:600}}>{saving?"…":"Save"}</button><button onClick={()=>setEditing(null)} style={{background:"none",border:"none",color:"var(--text3)",fontSize:18,cursor:"pointer"}}>✕</button></div>}
        </div>;
      })}
    </div>
  );
}

function Confetti(){const bits=Array.from({length:14});const colors=["#FFD23F","#10B981","#FCA5A5","#fff","#F5B700"];return<div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden"}}>{bits.map((_,i)=><div key={i} style={{position:"absolute",top:-10,left:(i/14*100)+"%",width:7,height:7,borderRadius:2,background:colors[i%colors.length],animation:`confettiFall ${1+Math.random()}s ease-out ${Math.random()*0.4}s forwards`}}/>)}</div>;}

// ── FINANCE PORTFOLIO ──
function FPortfolio({data,stockPrices,cryptoPrices,usdIdr,refreshing,onRefresh}){
  function sv(s){return(stockPrices[s.ticker]||s.avg_buy)*s.shares;}
  function sg(s){return((stockPrices[s.ticker]||s.avg_buy)-s.avg_buy)*s.shares;}
  function cv(c){return(cryptoPrices[c.coin.toLowerCase()]||c.avg_buy)*c.amount;}
  function cg(c){return((cryptoPrices[c.coin.toLowerCase()]||c.avg_buy)-c.avg_buy)*c.amount;}
  function dt(d){return d.principal*(1+d.rate/100*d.duration/12);}
  function dg(d){return d.principal*(d.rate/100*d.duration/12);}
  function lm(l){return Math.max(0,(new Date()-new Date(l.start_date))/(1e3*60*60*24*30.44));}
  function li(l){return l.principal*(l.rate/100)*(lm(l)/12);}
  function lt(l){const i=li(l);return l.currency==="USD"?(l.principal+i)*usdIdr:l.principal+i;}
  const tS=(data.stocks||[]).reduce((s,x)=>s+sv(x),0);
  const tC=(data.crypto||[]).reduce((s,x)=>s+cv(x),0);
  const tD=(data.deposits||[]).reduce((s,x)=>s+dt(x),0);
  const tL=(data.loans||[]).reduce((s,x)=>s+lt(x),0);
  const grand=tS+tC+tD+tL;
  const animGrand=useCountUp(grand);
  const alloc=[{label:"Stocks",val:tS,color:"#3B82F6"},{label:"Crypto",val:tC,color:"#F59E0B"},{label:"Deposits",val:tD,color:"#10B981"},{label:"Loans",val:tL,color:"#A855F7"}].filter(a=>a.val>0);
  return(
    <div style={{padding:"20px 16px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div style={{fontSize:22,fontWeight:800,color:"var(--text)",letterSpacing:-0.5}}>Wealth</div><button onClick={onRefresh} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:"7px 13px",color:"var(--emerald)",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}><i className={`ti ti-refresh${refreshing?" spin":""}`} style={{fontSize:14}}/>Refresh</button></div>
      <div className="spring" style={{background:"var(--grad)",backgroundSize:"200% 200%",animation:"shimmer 10s ease infinite",borderRadius:22,padding:"20px",marginBottom:16,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,right:-20,width:130,height:130,borderRadius:"50%",background:"rgba(255,255,255,0.08)"}}/>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.75)"}}>Total portfolio</div>
        <div style={{fontSize:34,fontWeight:800,color:"#fff",letterSpacing:-1.5,marginTop:2}}>Rp {fmtK(animGrand)}</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginTop:3}}>USD/IDR {Math.round(usdIdr).toLocaleString("id-ID")} · {refreshing?"Fetching prices…":"Prices updated"}</div>
        {alloc.length>0&&<><div style={{display:"flex",gap:3,height:8,borderRadius:99,overflow:"hidden",marginTop:16}}>{alloc.map(a=><div key={a.label} style={{flex:a.val,background:a.color}}/>)}</div><div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap"}}>{alloc.map(a=><div key={a.label} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:"50%",background:a.color}}/><span style={{fontSize:11,color:"rgba(255,255,255,0.85)",fontWeight:500}}>{a.label} {grand>0?Math.round(a.val/grand*100):0}%</span></div>)}</div></>}
      </div>
      {(data.stocks||[]).length>0&&<PCard title="IDX Stocks" total={tS} color="#3B82F6" icon="ti-chart-candle">{(data.stocks||[]).map(s=>{const g=sg(s);const pct=s.avg_buy>0?(g/(s.avg_buy*s.shares))*100:0;const live=stockPrices[s.ticker];return<div key={s.id} style={{padding:"9px 0",borderBottom:"1px solid var(--border)"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:14,fontWeight:600,color:"#3B82F6"}}>{s.ticker}<span style={{fontSize:11,color:"var(--text3)",fontWeight:400}}>.JK</span></div><div style={{fontSize:11,color:"var(--text3)"}}>{s.shares} sh · avg Rp {fmtK(s.avg_buy)}</div>{live&&<div style={{fontSize:11,color:"#10B981"}}>Live: Rp {fmtK(live)} <span style={{color:"var(--text3)"}}>vs avg {(((live-s.avg_buy)/s.avg_buy)*100).toFixed(1)}%</span></div>}{!live&&<div style={{fontSize:11,color:"#F59E0B"}}>Tap Refresh for live price</div>}</div><div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>Rp {fmtK(sv(s))}</div><div style={{fontSize:12,fontWeight:600,color:g>=0?"#10B981":"#EF4444"}}>{g>=0?"▲":"▼"} {fmtK(Math.abs(g))} ({pct>=0?"+":""}{pct.toFixed(1)}%)</div></div></div></div>;})}  </PCard>}
      {(data.crypto||[]).length>0&&<PCard title="Crypto" total={tC} color="#F59E0B" icon="ti-currency-bitcoin">{(data.crypto||[]).map(c=>{const g=cg(c);const cost=c.avg_buy*c.amount;const pct=cost>0?g/cost*100:0;return<PRow key={c.id} name={c.coin.toUpperCase()} sub={`${c.amount} · avg Rp ${fmtK(c.avg_buy)}`} val={cv(c)} gain={g} pct={pct}/>;})}</PCard>}
      {(data.deposits||[]).length>0&&<PCard title="Bank Deposits" total={tD} color="#10B981" icon="ti-pig-money">{(data.deposits||[]).map(d=><PRow key={d.id} name={d.bank||"Deposit"} sub={`${d.rate}% p.a. · ${d.duration}mo`} val={dt(d)} gain={dg(d)} pct={d.rate/100*d.duration/12*100}/>)}</PCard>}
      {(data.loans||[]).length>0&&<PCard title="Personal Loans" total={tL} color="#A855F7" icon="ti-users">{(data.loans||[]).map(l=>{const i=li(l);return<PRow key={l.id} name={l.borrower} sub={`${l.currency==="USD"?"$"+l.principal.toLocaleString():"Rp "+fmtK(l.principal)} · ${l.rate}%`} val={lt(l)} gain={l.currency==="USD"?i*usdIdr:i} pct={l.rate}/>;})}</PCard>}
      {grand===0&&<div style={{textAlign:"center",padding:"3rem",color:"var(--text3)",fontSize:13}}>No assets yet. Add them in Setup.</div>}
    </div>
  );
}
function PCard({title,total,color,icon,children}){const [open,setOpen]=useState(true);return<div className="spring" style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:18,marginBottom:12,overflow:"hidden"}}><div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:11,padding:"13px 14px",cursor:"pointer"}}><div style={{width:38,height:38,borderRadius:12,background:`${color}22`,display:"flex",alignItems:"center",justifyContent:"center"}}><i className={`ti ${icon}`} style={{fontSize:18,color}}/></div><div style={{flex:1,fontSize:14,fontWeight:600,color:"var(--text)"}}>{title}</div><div style={{fontSize:15,fontWeight:700,color:"var(--text)",marginRight:6}}>Rp {fmtK(total)}</div><i className={`ti ti-chevron-${open?"up":"down"}`} style={{fontSize:16,color:"var(--text3)"}}/></div>{open&&<div style={{borderTop:"1px solid var(--border)",padding:"4px 14px 10px"}}>{children}</div>}</div>;}
function PRow({name,sub,val,gain,pct}){return<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid var(--border)"}}><div><div style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{name}</div><div style={{fontSize:11,color:"var(--text3)"}}>{sub}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>Rp {fmtK(val)}</div><div style={{fontSize:12,fontWeight:600,color:gain>=0?"#10B981":"#EF4444"}}>{gain>=0?"▲":"▼"} {fmtK(Math.abs(gain))} ({pct>=0?"+":""}{pct.toFixed(1)}%)</div></div></div>;}

// ── FINANCE HISTORY ──
function FHistory({data,month,setMonth,allMonths,onEdit,onDelete}){
  const [filter,setFilter]=useState("all");
  const txns=data.transactions.filter(t=>mk(t.date)===month&&(filter==="all"||t.type===filter));
  const income=txns.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense=txns.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  return(
    <div style={{padding:"20px 16px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><select value={month} onChange={e=>setMonth(e.target.value)} style={{fontSize:22,fontWeight:800,color:"var(--text)",background:"none",border:"none",cursor:"pointer",outline:"none",letterSpacing:-0.5}}>{allMonths.map(m=><option key={m} value={m}>{monthLabel(m)}</option>)}</select></div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>{["all","income","expense"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"7px 16px",borderRadius:99,fontSize:12,fontWeight:600,border:filter===f?"none":"1px solid var(--border)",background:filter===f?"var(--emerald)":"var(--surface)",color:filter===f?"#fff":"var(--text2)",cursor:"pointer",textTransform:"capitalize"}}>{f}</button>)}</div>
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <div style={{flex:1,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:"12px 14px"}}><div style={{fontSize:11,color:"var(--text3)"}}>Income</div><div style={{fontSize:17,fontWeight:700,color:"#10B981"}}>Rp {fmtK(income)}</div></div>
        <div style={{flex:1,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:"12px 14px"}}><div style={{fontSize:11,color:"var(--text3)"}}>Expenses</div><div style={{fontSize:17,fontWeight:700,color:"#EF4444"}}>Rp {fmtK(expense)}</div></div>
      </div>

    </div>
  );
}

// ══════════════════════════════════════════════
// GYM APP
// ══════════════════════════════════════════════
const GYM_NAV=[{id:"log",icon:"ti-plus",label:"Log"},{id:"history",icon:"ti-history",label:"History"},{id:"prs",icon:"ti-trophy",label:"PRs"},{id:"routine",icon:"ti-settings-2",label:"Routine"}];
const BG_PAT=`url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='2' fill='%23ffffff' fill-opacity='0.06'/%3E%3C/svg%3E")`;

function GymApp({profile}){
  const [tab,setTab]=useState("log");
  const [days,setDays]=useState([]);
  const [sessions,setSessions]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{loadGym();},[profile.id]);

  async function loadGym(){
    setLoading(true);
    try{
      const [daysRaw,exsRaw,sessRaw,setsRaw]=await Promise.all([
        dbGet("workout_days",`?profile_id=eq.${profile.id}&order=sort_order.asc`),
        dbGet("workout_exercises",`?day_id=in.(${(await dbGet("workout_days",`?profile_id=eq.${profile.id}&select=id`)).map(d=>d.id).join(",")||"none"})`),
        dbGet("workout_sessions",`?profile_id=eq.${profile.id}&order=date.desc`),
        dbGet("workout_sets",`?session_id=in.(${(await dbGet("workout_sessions",`?profile_id=eq.${profile.id}&select=id`)).map(s=>s.id).join(",")||"none"})`),
      ]);
      const exsByDay={};(exsRaw||[]).forEach(e=>{if(!exsByDay[e.day_id])exsByDay[e.day_id]=[];exsByDay[e.day_id].push(e);});
      const daysBuilt=(daysRaw||[]).map(d=>({...d,exercises:(exsByDay[d.id]||[]).sort((a,b)=>a.sort_order-b.sort_order).map(e=>e.name)}));
      setDays(daysBuilt);
      const setsBySession={};(setsRaw||[]).forEach(s=>{if(!setsBySession[s.session_id])setsBySession[s.session_id]=[];setsBySession[s.session_id].push(s);});
      const sessBuilt=(sessRaw||[]).map(s=>({...s,exercises:buildExercises(setsBySession[s.id]||[])}));
      setSessions(sessBuilt);
    }catch(e){console.error(e);}
    setLoading(false);
  }

  function buildExercises(sets){
    const byName={};sets.forEach(s=>{if(!byName[s.exercise_name])byName[s.exercise_name]=[];byName[s.exercise_name].push({weight:s.weight,reps:s.reps});});
    return Object.entries(byName).map(([name,sets])=>({name,sets}));
  }

  async function saveSession(session){
    const sessRow={id:session.id,profile_id:profile.id,day_id:session.dayId,date:session.date};
    await dbPost("workout_sessions",sessRow);
    for(const ex of session.exercises){
      for(const s of ex.sets){
        await dbPost("workout_sets",{id:uid(),session_id:session.id,exercise_name:ex.name,weight:s.weight,reps:s.reps});
      }
    }
    setSessions(prev=>[{...sessRow,exercises:session.exercises},...prev]);
    setTab("history");
  }

  async function deleteSession(id){
    await dbDelete("workout_sets",`?session_id=eq.${id}`);
    await dbDelete("workout_sessions",`?id=eq.${id}`);
    setSessions(prev=>prev.filter(s=>s.id!==id));
  }

  async function updateDays(newDays){
    // simplified: just update local state (full sync would be more complex)
    setDays(newDays);
  }

  function computePRs(){
    const prs={};
    sessions.forEach(s=>s.exercises.forEach(ex=>ex.sets.forEach(set=>{
      const v=+(set.weight*(1+set.reps/30)).toFixed(1);
      if(!prs[ex.name]||v>prs[ex.name].e1rm)prs[ex.name]={e1rm:v,weight:set.weight,reps:set.reps,date:s.date};
    })));
    return prs;
  }

  function getTargets(exerciseName){
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-14);
    const cutoffStr=cutoff.toISOString().slice(0,10);
    let mw=0,mr=0;
    sessions.forEach(s=>{
      if(s.date<cutoffStr)return;
      s.exercises.forEach(ex=>{
        if(ex.name!==exerciseName)return;
        ex.sets.forEach(set=>{if(set.weight>mw)mw=set.weight;if(set.reps>mr)mr=set.reps;});
      });
    });
    return mw>0||mr>0?{weight:mw,reps:mr}:null;
  }

  const prs=computePRs();
  const streak=getStreak(sessions);

  if(loading)return<div style={{paddingBottom:90}}><Spinner/></div>;

  return(
    <div style={{paddingBottom:90}}>
      {/* Gym header */}
      <div style={{background:"var(--gym-grad)",backgroundSize:"200% 200%",animation:"shimmer 10s ease infinite",padding:"20px 18px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,right:-20,width:130,height:130,borderRadius:"50%",background:"rgba(255,255,255,0.08)"}}/>
        <div style={{fontSize:22,fontWeight:800,color:"#fff",letterSpacing:-0.5,marginBottom:14,position:"relative"}}>Gym Tracker</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,position:"relative"}}>
          {[["Sessions",sessions.length,"ti-calendar"],["PRs",Object.keys(prs).length,"ti-trophy"],["Streak",streak+"d","ti-flame"]].map(([l,v,ic])=>(
            <div key={l} style={{background:"rgba(255,255,255,0.12)",borderRadius:12,padding:"10px",textAlign:"center"}}>
              <i className={`ti ${ic}`} style={{fontSize:17,color:"rgba(255,255,255,0.7)",display:"block",marginBottom:3}}/>
              <div style={{fontSize:19,fontWeight:700,color:"#fff"}}>{v}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.55)"}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"0 16px"}}>
        {tab==="log"&&<GymLog days={days} prs={prs} sessions={sessions} getTargets={getTargets} onSave={saveSession}/>}
        {tab==="history"&&<GymHistory sessions={sessions} days={days} prs={prs} onDelete={deleteSession}/>}
        {tab==="prs"&&<GymPRs prs={prs}/>}
        {tab==="routine"&&<GymRoutine days={days} onUpdate={updateDays} profile={profile}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,zIndex:40,paddingBottom:"env(safe-area-inset-bottom)"}}>
        <div style={{margin:"0 12px 8px",background:"var(--surface)",borderRadius:24,display:"flex",alignItems:"center",boxShadow:"0 8px 30px rgba(0,0,0,0.12)",border:"1px solid var(--border)",padding:"6px 4px"}}>
          {GYM_NAV.map(n=>(
            <button key={n.id} onClick={()=>setTab(n.id)} className="nav-press" style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 0",background:"none",border:"none",cursor:"pointer",color:tab===n.id?"#1565C0":"var(--text3)"}}>
              <i className={`ti ${n.icon}`} style={{fontSize:21}}/><span style={{fontSize:9,fontWeight:tab===n.id?700:500}}>{n.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function getStreak(sessions){
  if(!sessions.length)return 0;
  const dates=[...new Set(sessions.map(s=>s.date))].sort().reverse();
  let streak=0,cur=new Date(todayStr());
  for(const d of dates){
    const diff=Math.round((cur-new Date(d+"T12:00:00"))/86400000);
    if(diff<=1){streak++;cur=new Date(d+"T12:00:00");}else break;
  }
  return streak;
}

function e1rm(w,r){return+(w*(1+r/30)).toFixed(1);}

function GymLog({days,prs,sessions,getTargets,onSave}){
  const [dayId,setDayId]=useState(null);
  const [date,setDate]=useState(todayStr());
  const [sets,setSets]=useState({});
  const [flash,setFlash]=useState(false);
  const [saving,setSaving]=useState(false);
  const day=days.find(d=>d.id===dayId);
  const DAYCOLORS=["#1565C0","#1976D2","#0D47A1","#1E88E5","#0A3272"];

  function selectDay(d){setDayId(d.id);const s={};d.exercises.forEach(ex=>{s[ex]=[{id:uid(),weight:"",reps:""}];});setSets(s);}
  const addSet=ex=>setSets(s=>({...s,[ex]:[...(s[ex]||[]),{id:uid(),weight:"",reps:""}]}));
  const delSet=(ex,id)=>setSets(s=>({...s,[ex]:s[ex].filter(r=>r.id!==id)}));
  const upSet=(ex,id,k,v)=>setSets(s=>({...s,[ex]:s[ex].map(r=>r.id===id?{...r,[k]:v}:r)}));

  async function handleSave(){
    const exercises=Object.entries(sets).map(([name,rows])=>({name,sets:rows.filter(r=>r.weight&&r.reps).map(r=>({weight:+r.weight,reps:+r.reps}))})).filter(e=>e.sets.length);
    if(!exercises.length||saving)return;
    setSaving(true);
    await onSave({id:uid(),dayId,date,exercises});
    setDayId(null);setSets({});setDate(todayStr());
    setFlash(true);setTimeout(()=>setFlash(false),1800);setSaving(false);
  }

  if(!day)return(
    <div style={{paddingTop:16}}>
      <p style={{fontSize:14,color:"var(--text2)",marginTop:0,marginBottom:14}}>What are you training today?</p>
      <div style={{display:"grid",gridTemplateColumns:days.length<=3?`repeat(${days.length},1fr)`:"repeat(3,1fr)",gap:10}}>
        {days.map((d,i)=>(
          <button key={d.id} onClick={()=>selectDay(d)} className="card-press" style={{background:"var(--surface)",border:`2px solid ${DAYCOLORS[i%5]}`,borderRadius:16,padding:"14px 8px",cursor:"pointer",textAlign:"center"}}>
            <i className={`ti ${d.icon||"ti-barbell"}`} style={{fontSize:22,color:DAYCOLORS[i%5],display:"block",marginBottom:6}}/>
            <span style={{fontSize:12,fontWeight:600,color:"var(--text)",display:"block"}}>{d.label}</span>
            <span style={{fontSize:10,color:"var(--text3)"}}>{d.exercises.length} exercises</span>
          </button>
        ))}
      </div>
    </div>
  );

  const dayIndex=days.findIndex(d=>d.id===dayId);
  const bgColor=DAYCOLORS[dayIndex%5];
  const canSave=Object.values(sets).some(rows=>rows.some(r=>r.weight&&r.reps));

  return(
    <div style={{paddingTop:12}}>
      <div style={{background:bgColor,backgroundImage:BG_PAT,borderRadius:16,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>{setDayId(null);setSets({});}} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:9,cursor:"pointer",color:"#fff",padding:"5px 10px",display:"flex",alignItems:"center",gap:4,fontSize:12,fontWeight:600}}><i className="ti ti-arrow-left" style={{fontSize:13}}/>Back</button>
          <span style={{fontSize:15,fontWeight:700,color:"#fff"}}>{day.label} Day</span>
        </div>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{fontSize:11,border:"none",background:"rgba(255,255,255,0.2)",color:"#fff",borderRadius:9,padding:"5px 10px",fontWeight:600}}/>
      </div>
      {day.exercises.map(ex=>{
        const curPR=prs[ex];const target=getTargets(ex);const rows=sets[ex]||[];
        const bestE1RM=rows.reduce((b,s)=>!s.weight||!s.reps?b:Math.max(b,e1rm(+s.weight,+s.reps)),0);
        const isNewPR=curPR&&bestE1RM>curPR.e1rm;
        return(
          <div key={ex} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,marginBottom:10,overflow:"hidden"}}>
            <div style={{background:"var(--surface2)",padding:"10px 14px",borderBottom:"1px solid var(--border)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:target?6:0}}>
                <span style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>{ex}</span>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {curPR&&<span style={{fontSize:11,color:"var(--text3)"}}>PR: {curPR.weight}kg×{curPR.reps}</span>}
                  {isNewPR&&<span style={{fontSize:11,background:"#1565C0",color:"#fff",padding:"2px 8px",borderRadius:99,fontWeight:700}}>🎉 New PR!</span>}
                </div>
              </div>
              {target&&<div style={{display:"flex",gap:8,alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:5,background:"#1565C0",borderRadius:8,padding:"4px 10px"}}><i className="ti ti-target" style={{fontSize:12,color:"#fff"}}/><span style={{fontSize:11,color:"#fff",fontWeight:600}}>Target {target.weight}kg × {target.reps}</span></div>
                <span style={{fontSize:10,color:"var(--text3)"}}>last 14 days</span>
              </div>}
            </div>
            <div style={{padding:"10px 14px"}}>
              <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 28px",gap:"5px 8px",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:11,color:"var(--text3)",textAlign:"center"}}>#</span>
                <span style={{fontSize:11,color:"var(--text3)"}}>Weight (kg)</span>
                <span style={{fontSize:11,color:"var(--text3)"}}>Reps</span>
                <span/>
                {rows.map((r,ri)=>{
                  const isPRset=curPR&&r.weight&&r.reps&&e1rm(+r.weight,+r.reps)>curPR.e1rm;
                  return[
                    <div key={`n${r.id}`} style={{textAlign:"center",fontSize:12,height:36,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:9,background:isPRset?"#1565C0":"var(--surface2)",color:isPRset?"#fff":"var(--text2)",fontWeight:700}}>{ri+1}</div>,
                    <input key={`w${r.id}`} type="number" inputMode="decimal" min="0" step="0.5" placeholder={target?String(target.weight):"0"} value={r.weight} onChange={e=>upSet(ex,r.id,"weight",e.target.value)} style={{fontSize:15,padding:"7px 10px",borderRadius:9,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",width:"100%",textAlign:"right",outline:"none"}}/>,
                    <input key={`r${r.id}`} type="number" inputMode="numeric" min="0" placeholder={target?String(target.reps):"0"} value={r.reps} onChange={e=>upSet(ex,r.id,"reps",e.target.value)} style={{fontSize:15,padding:"7px 10px",borderRadius:9,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",width:"100%",textAlign:"right",outline:"none"}}/>,
                    <button key={`d${r.id}`} onClick={()=>delSet(ex,r.id)} disabled={rows.length===1} style={{background:"none",border:"none",cursor:rows.length===1?"default":"pointer",color:"var(--text3)",opacity:rows.length===1?0.2:1,padding:2}}><i className="ti ti-x" style={{fontSize:14}}/></button>
                  ];
                })}
              </div>
              <button onClick={()=>addSet(ex)} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:600,color:"#1565C0",background:"var(--surface2)",border:"none",borderRadius:9,padding:"6px 12px",cursor:"pointer"}}>
                <i className="ti ti-plus" style={{fontSize:12}}/>Add set
              </button>
            </div>
          </div>
        );
      })}
      <button onClick={handleSave} disabled={!canSave||saving} className="card-press" style={{width:"100%",padding:"15px",marginTop:4,marginBottom:16,background:flash?"#10B981":canSave?bgColor:"var(--border)",color:"#fff",border:"none",borderRadius:16,fontSize:15,fontWeight:700,cursor:canSave&&!saving?"pointer":"default",backgroundImage:flash||!canSave?"none":BG_PAT,boxShadow:canSave&&!flash?`0 6px 18px ${bgColor}55`:"none"}}>
        {saving?"Saving…":flash?"✓ Saved!":"Save workout"}
      </button>
    </div>
  );
}

function GymHistory({sessions,days,prs,onDelete}){
  const [confirm,setConfirm]=useState(null);
  const DAYCOLORS=["#1565C0","#1976D2","#0D47A1","#1E88E5","#0A3272"];
  if(!sessions.length)return<div style={{textAlign:"center",padding:"3rem 1rem",color:"var(--text3)"}}><i className="ti ti-barbell" style={{fontSize:36,display:"block",marginBottom:12}}/><div style={{fontSize:14}}>No workouts yet. Log your first session!</div></div>;
  return(
    <div style={{paddingTop:16}}>
      {sessions.map(s=>{
        const dayDef=days.find(d=>d.id===s.day_id);
        const dayIndex=days.findIndex(d=>d.id===s.day_id);
        const bgColor=DAYCOLORS[dayIndex%5]||"#1565C0";
        const hasPR=s.exercises.some(ex=>{const pr=prs[ex.name];return pr&&pr.date===s.date;});
        const vol=s.exercises.reduce((t,ex)=>t+ex.sets.reduce((s2,set)=>s2+set.weight*set.reps,0),0);
        return(
          <div key={s.id} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,marginBottom:10,overflow:"hidden"}}>
            <div style={{background:bgColor,backgroundImage:BG_PAT,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:14,fontWeight:700,color:"#fff"}}>{dayDef?dayDef.label+" Day":"Workout"}</span>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>{s.date}</span>
                {hasPR&&<span style={{fontSize:10,background:"rgba(255,255,255,0.25)",color:"#fff",padding:"2px 7px",borderRadius:99,fontWeight:600}}>🏆 PR day</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>Vol: {Math.round(vol)}kg</span>
                <button onClick={()=>confirm===s.id?(onDelete(s.id),setConfirm(null)):setConfirm(s.id)} style={{background:confirm===s.id?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.2)",border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",color:confirm===s.id?"#EF4444":"#fff",fontSize:12,fontWeight:600}}>
                  {confirm===s.id?"Confirm":"Delete"}
                </button>
              </div>
            </div>
            <div style={{padding:"10px 14px",display:"flex",flexDirection:"column",gap:6}}>
              {s.exercises.map((ex,i)=>{
                const pr=prs[ex.name];const exPR=pr&&pr.date===s.date;
                return(
                  <div key={i} style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",padding:"8px 10px",background:"var(--surface2)",borderRadius:11}}>
                    <div><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}><span style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{ex.name}</span>{exPR&&<i className="ti ti-trophy" style={{fontSize:13,color:"#F59E0B"}}/>}</div><div style={{fontSize:11,color:"var(--text3)"}}>{ex.sets.map(s=>`${s.weight}kg×${s.reps}`).join(" · ")}</div></div>
                    <div style={{fontSize:12,fontWeight:700,color:"var(--text)"}}>{Math.round(ex.sets.reduce((t,s)=>t+s.weight*s.reps,0))}kg</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function GymPRs({prs}){
  const entries=Object.entries(prs).sort((a,b)=>a[0].localeCompare(b[0]));
  const PALETTE=["#1565C0","#1976D2","#1E88E5","#42A5F5","#0D47A1","#0A3272"];
  if(!entries.length)return<div style={{textAlign:"center",padding:"3rem 1rem",color:"var(--text3)"}}><i className="ti ti-trophy" style={{fontSize:36,display:"block",marginBottom:12}}/><div style={{fontSize:14}}>Log workouts to track PRs!</div></div>;
  return(
    <div style={{paddingTop:16}}>
      <p style={{fontSize:13,color:"var(--text2)",marginTop:0,marginBottom:14}}>Estimated 1-rep max per exercise.</p>
      {entries.map(([name,pr],i)=>(
        <div key={name} className="spring" style={{display:"flex",alignItems:"center",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,padding:"14px 16px",marginBottom:8,borderLeft:`4px solid ${PALETTE[i%PALETTE.length]}`,animationDelay:(i*0.04)+"s"}}>
          <div style={{width:38,height:38,borderRadius:12,background:`${PALETTE[i%PALETTE.length]}18`,display:"flex",alignItems:"center",justifyContent:"center",marginRight:14,flexShrink:0}}><i className="ti ti-trophy" style={{fontSize:18,color:PALETTE[i%PALETTE.length]}}/></div>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,color:"var(--text)",marginBottom:1}}>{name}</div><div style={{fontSize:12,color:"var(--text3)"}}>{pr.weight}kg × {pr.reps} · {pr.date}</div></div>
          <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:22,fontWeight:800,color:"var(--text)"}}>{pr.e1rm}<span style={{fontSize:12,fontWeight:400,color:"var(--text3)"}}>kg</span></div><div style={{fontSize:10,color:"var(--text3)"}}>est. 1RM</div></div>
        </div>
      ))}
    </div>
  );
}

function GymRoutine({days,onUpdate,profile}){
  const [activeIdx,setActiveIdx]=useState(0);
  const [editingEx,setEditingEx]=useState(null);
  const [exVal,setExVal]=useState("");
  const [editingDayIdx,setEditingDayIdx]=useState(null);
  const [dayLabelVal,setDayLabelVal]=useState("");
  const DAYCOLORS=["#1565C0","#1976D2","#0D47A1","#1E88E5","#0A3272"];
  const day=days[activeIdx]||days[0];
  if(!day)return<div style={{paddingTop:16,textAlign:"center",color:"var(--text3)"}}>No routine yet.</div>;
  const bgColor=DAYCOLORS[activeIdx%5];

  function updateEx(list){onUpdate(days.map((d,i)=>i===activeIdx?{...d,exercises:list}:d));}
  function saveEx(i){if(!exVal.trim()){setEditingEx(null);return;}updateEx(day.exercises.map((e,idx)=>idx===i?exVal.trim():e));setEditingEx(null);}
  function deleteEx(i){updateEx(day.exercises.filter((_,idx)=>idx!==i));}
  function moveEx(i,dir){const a=[...day.exercises];const j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];updateEx(a);}
  function addEx(){updateEx([...day.exercises,""]);setEditingEx(day.exercises.length);setExVal("");}

  return(
    <div style={{paddingTop:16}}>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {days.map((d,i)=>(
          <button key={d.id} onClick={()=>setActiveIdx(i)} style={{padding:"8px 14px",borderRadius:99,fontSize:12,fontWeight:600,border:"none",background:activeIdx===i?DAYCOLORS[i%5]:"var(--surface)",color:activeIdx===i?"#fff":"var(--text2)",cursor:"pointer",border:activeIdx===i?"none":"1px solid var(--border)"}}>
            {d.label}
          </button>
        ))}
      </div>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,overflow:"hidden",marginBottom:16}}>
        <div style={{background:bgColor,backgroundImage:BG_PAT,padding:"11px 14px"}}>
          <span style={{fontSize:14,fontWeight:700,color:"#fff"}}>{day.label} — {day.exercises.length} exercises</span>
        </div>
        {day.exercises.length===0&&<div style={{padding:"1.5rem",textAlign:"center",color:"var(--text3)",fontSize:13}}>No exercises. Add one below.</div>}
        {day.exercises.map((ex,i)=>(
          <div key={`${day.id}-${i}`} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderBottom:i<day.exercises.length-1?"1px solid var(--border)":"none",background:editingEx===i?"var(--surface2)":"var(--surface)"}}>
            <div style={{display:"flex",flexDirection:"column",gap:1}}>
              <button onClick={()=>moveEx(i,-1)} disabled={i===0} style={{background:"none",border:"none",cursor:i===0?"default":"pointer",color:"var(--text3)",opacity:i===0?0.2:1,padding:0,lineHeight:1}}><i className="ti ti-chevron-up" style={{fontSize:14}}/></button>
              <button onClick={()=>moveEx(i,1)} disabled={i===day.exercises.length-1} style={{background:"none",border:"none",cursor:i===day.exercises.length-1?"default":"pointer",color:"var(--text3)",opacity:i===day.exercises.length-1?0.2:1,padding:0,lineHeight:1}}><i className="ti ti-chevron-down" style={{fontSize:14}}/></button>
            </div>
            <div style={{width:26,height:26,borderRadius:8,background:editingEx===i?bgColor:"var(--surface2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{fontSize:11,fontWeight:700,color:editingEx===i?"#fff":"var(--text2)"}}>{i+1}</span>
            </div>
            {editingEx===i?(
              <input autoFocus value={exVal} onChange={e=>setExVal(e.target.value)} onBlur={()=>saveEx(i)} onKeyDown={e=>{if(e.key==="Enter")saveEx(i);if(e.key==="Escape")setEditingEx(null);}} placeholder="Exercise name" style={{flex:1,fontSize:14,border:"none",borderBottom:`2px solid ${bgColor}`,background:"none",color:"var(--text)",outline:"none",padding:"2px 0"}}/>
            ):(
              <span style={{flex:1,fontSize:14,color:"var(--text)",cursor:"text"}} onClick={()=>{setEditingEx(i);setExVal(ex);}}>{ex||<span style={{color:"var(--text3)"}}>Unnamed</span>}</span>
            )}
            <button onClick={()=>{setEditingEx(i);setExVal(ex);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text3)",padding:4}}><i className="ti ti-pencil" style={{fontSize:14}}/></button>
            <button onClick={()=>deleteEx(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#EF4444",padding:4}}><i className="ti ti-trash" style={{fontSize:14}}/></button>
          </div>
        ))}
        <button onClick={addEx} style={{width:"100%",padding:"12px",background:"none",border:"none",borderTop:day.exercises.length?"1px solid var(--border)":"none",cursor:"pointer",fontSize:13,fontWeight:600,color:bgColor,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <i className="ti ti-plus" style={{fontSize:14}}/>Add exercise
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
